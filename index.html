---
layout: default
---
<div style="font-family: sans-serif; padding: 20px;">
  <h1>Каталог тестовых товаров</h1>
  <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;">
    {% for item in site.data.products %}
      <div style="border: 1px solid #ccc; padding: 15px; border-radius: 8px;">
        {% assign images = item.images | split: ';' %}
        <img src="{{ images.first }}" alt="{{ item.name }}" style="max-width: 100%;">
        <h3>{{ item.name }}</h3>
        <p style="font-weight: bold; color: green;">Цена: {{ item.price }} {{ site.currency }}</p>
        <p>{{ item.description }}</p>
        <button onclick="addToCart('{{ item.id }}', '{{ item.name }}', {{ item.price }}, '{{ images.first }}')" style="padding: 10px; background: blue; color: white; border: none; cursor: pointer;">В корзину</button>
      </div>
    {% endfor %}
  </div>

  <script>
  function addToCart(id, title, price, image) {
    let cart = JSON.parse(localStorage.getItem('mySimpleCart')) || [];
    cart.push({id: id, title: title, price: price, image: image});
    localStorage.setItem('mySimpleCart', JSON.stringify(cart));
    alert('«' + title + '» добавлено в корзину!');
    if (typeof updateBadge === 'function') updateBadge();
  }
  </script>
</div>
