<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.name | default: page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <header>
    <div>
      <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <small class="theme-label">{{ site.theme }}</small>
    </div>
    <nav>
      <a href="{{ '/cart' | relative_url }}">Корзина (<strong id="cart-badge">0</strong>)</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>&copy; {{ "now" | date: "%Y" }} {{ site.title }}</p>
  </footer>

  <div id="toast" class="toast"></div>

  <script>
    // Безопасное чтение корзины из localStorage
    function getCart() {
      try {
        var data = JSON.parse(localStorage.getItem('mySimpleCart'));
        if (Array.isArray(data)) return data;
      } catch (e) {}
      return [];
    }

    // Сохранение корзины
    function saveCart(cart) {
      localStorage.setItem('mySimpleCart', JSON.stringify(cart));
    }

    // Обновление бейджа (учитывает quantity)
    function updateBadge() {
      var cart = getCart();
      var count = 0;
      cart.forEach(function(item) {
        count += item.qty || 1;
      });
      var badge = document.getElementById('cart-badge');
      if (badge) badge.innerText = count;
    }

    // Toast-уведомление вместо alert()
    function showToast(text) {
      var el = document.getElementById('toast');
      if (!el) return;
      el.textContent = text;
      el.classList.add('toast-visible');
      setTimeout(function() {
        el.classList.remove('toast-visible');
      }, 2000);
    }

    document.addEventListener("DOMContentLoaded", updateBadge);
  </script>
</body>
</html>
