<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
  {{ custom_head }}
</head>
<body>
  <header class="site-header">
    <div class="site-brand">
      <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </div>
    <nav class="site-nav">
      <a href="{{ '/cart' | relative_url }}">
        <svg class="nav-cart-icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        Корзина
        <span id="cart-badge">0</span>
      </a>
    </nav>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ "now" | date: "%Y" }} {{ site.title }}</p>
    <div class="footer-theme">{{ site.theme }}</div>
  </footer>

  <div id="toast" class="toast"></div>

  <script>
    function getCart() {
      try {
        var data = JSON.parse(localStorage.getItem('mySimpleCart'));
        if (Array.isArray(data)) return data;
      } catch (e) {}
      return [];
    }

    function saveCart(cart) {
      localStorage.setItem('mySimpleCart', JSON.stringify(cart));
    }

    function updateBadge() {
      var cart = getCart();
      var count = 0;
      cart.forEach(function(item) { count += item.qty || 1; });
      var badge = document.getElementById('cart-badge');
      if (badge) badge.innerText = count;
    }

    function showToast(text) {
      var el = document.getElementById('toast');
      if (!el) return;
      el.textContent = text;
      el.classList.add('toast-visible');
      setTimeout(function() {
        el.classList.remove('toast-visible');
      }, 2200);
    }

    document.addEventListener("DOMContentLoaded", updateBadge);
  </script>
</body>
</html>
