---
layout: default
---

<article class="product-detail">

  <button onclick="window.history.back()">&larr; Назад</button>

  <h1>{{ page.name }}</h1>

  <p class="price">{{ page.price }} {{ site.currency }}</p>

  <div class="product-images">
    {% assign images = page.images | split: ';' %}
    {% for img in images %}
      <img src="{{ img }}" alt="{{ page.name | escape }}">
    {% endfor %}
  </div>

  <div class="product-description">
    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}
    {{ content }}
  </div>

  <button
    onclick="addToCart('{{ page.id | escape }}', '{{ page.name | escape }}', '{{ page.price }}', '{{ images[0] | escape }}')"
    class="btn-add-to-cart"
  >
    Добавить в корзину
  </button>

</article>

<script>
  function addToCart(id, title, price, image) {
    var cart = getCart();
    var found = false;
    cart.forEach(function(item) {
      if (item.id === id) {
        item.qty = (item.qty || 1) + 1;
        found = true;
      }
    });
    if (!found) {
      cart.push({ id: id, title: title, price: price, image: image, qty: 1 });
    }
    saveCart(cart);
    updateBadge();
    showToast('Добавлено: ' + title);
  }
</script>
