---
layout: default
---

<article class="product-detail">

  <button onclick="window.history.back()">&larr; Назад</button>

  <h1>{{ page.name }}</h1>

  <p class="price">{{ page.price }} {{ site.currency }}</p>

  <div class="product-images">
    {% assign images = page.images | split: ';' %}
    {% for img in images %}
      <img src="{{ img }}" alt="{{ page.name }}">
    {% endfor %}
  </div>

  <div class="product-description">
    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}
    {{ content }}
  </div>

  <button
    onclick="addToCart({ id: '{{ page.id }}', title: '{{ page.name }}', price: '{{ page.price }}', image: '{{ images[0] }}' })"
    class="btn-add-to-cart"
  >
    Добавить в корзину
  </button>

</article>

<script>
  function addToCart(product) {
    let cart = JSON.parse(localStorage.getItem('mySimpleCart')) || [];
    cart.push(product);
    localStorage.setItem('mySimpleCart', JSON.stringify(cart));

    alert('Товар добавлен в корзину!');

    if (typeof updateBadge === 'function') {
      updateBadge();
    }
  }
</script>
