---
layout: default
---

<h1>Ваша корзина</h1>

<div id="cart-items"></div>

<div id="cart-summary" style="display: none;">
  <h2>Итого: <span id="total-price">0</span> {{ site.currency }}</h2>
  <div class="checkout-btns">
    <button onclick="checkout('wa')" class="btn-wa">WhatsApp</button>
    <button onclick="checkout('tg')" class="btn-tg">Telegram</button>
  </div>
  <button onclick="clearCart()" class="btn-clear">Очистить корзину</button>
</div>

<script>
  function loadCart() {
    let cart = JSON.parse(localStorage.getItem('mySimpleCart')) || [];
    let container = document.getElementById('cart-items');
    let summary = document.getElementById('cart-summary');
    let totalSpan = document.getElementById('total-price');

    container.innerHTML = '';
    let total = 0;

    if (cart.length === 0) {
      container.innerHTML = '<p class="cart-empty">В корзине пусто</p><a href="{{ "/" | relative_url }}">Вернуться к покупкам</a>';
      summary.style.display = 'none';
      if (window.updateBadge) window.updateBadge();
      return;
    }

    summary.style.display = 'block';

    cart.forEach((item, index) => {
      total += parseFloat(item.price) || 0;
      let div = document.createElement('div');
      div.className = 'cart-item';

      div.innerHTML = `
        <img src="${item.image.replace(/"/g, '&quot;')}" alt="${item.title.replace(/"/g, '&quot;')}">
        <div class="cart-item-info">
          <strong>${item.title.replace(/</g, '&lt;')}</strong><br>
          <span class="cart-item-price">${item.price.replace(/</g, '&lt;')} {{ site.currency }}</span>
        </div>
        <button onclick="removeItem(${index})" class="btn-remove">Удалить</button>
      `;
      container.appendChild(div);
    });

    totalSpan.innerText = total.toLocaleString('ru-RU');
    if (window.updateBadge) window.updateBadge();
  }

  function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem('mySimpleCart')) || [];
    cart.splice(index, 1);
    localStorage.setItem('mySimpleCart', JSON.stringify(cart));
    loadCart();
  }

  function clearCart() {
    if (confirm('Очистить корзину?')) {
      localStorage.removeItem('mySimpleCart');
      loadCart();
    }
  }

  function checkout(messenger) {
    let cart = JSON.parse(localStorage.getItem('mySimpleCart')) || [];
    let total = 0;
    let message = "Здравствуйте! Хочу сделать заказ:\n\n";

    cart.forEach((item, index) => {
      message += `${index + 1}. ${item.title} — ${item.price} {{ site.currency }}\n`;
      total += parseFloat(item.price) || 0;
    });

    message += `\n🛒 *Сумма заказа:* ${total.toLocaleString('ru-RU')} {{ site.currency }}`;

    let phone = "{{ site.whatsapp_phone }}";
    let tgUser = "{{ site.telegram_user }}";

    let url = messenger === 'wa'
      ? `https://wa.me/${phone}?text=${encodeURIComponent(message)}`
      : `https://t.me/${tgUser}?text=${encodeURIComponent(message)}`;

    window.location.href = url;
  }

  document.addEventListener('DOMContentLoaded', loadCart);
</script>
