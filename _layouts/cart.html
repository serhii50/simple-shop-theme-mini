---
layout: default
---

<h1 class="cart-title">Корзина</h1>

<div id="cart-items"></div>

<div id="cart-summary" style="display: none;">
  <h2 class="cart-total">Итого: <span id="total-price">0</span> {{ site.currency }}</h2>
  <div class="checkout-btns">
    <button onclick="checkout('wa')" class="btn-checkout btn-wa">WhatsApp</button>
    <button onclick="checkout('tg')" class="btn-checkout btn-tg">Telegram</button>
  </div>
  <button onclick="clearCart()" class="btn-clear">Очистить корзину</button>
</div>

<script>
  var siteUrl = "{{ site.url }}{{ site.baseurl }}";

  function esc(str) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(String(str)));
    return d.innerHTML;
  }

  function loadCart() {
    var cart = getCart();
    var container = document.getElementById('cart-items');
    var summary = document.getElementById('cart-summary');
    var totalSpan = document.getElementById('total-price');

    container.innerHTML = '';
    var total = 0;

    if (cart.length === 0) {
      container.innerHTML = '<div class="cart-empty"><p>Корзина пуста</p><a href="{{ "/" | relative_url }}">← Вернуться к покупкам</a></div>';
      summary.style.display = 'none';
      updateBadge();
      return;
    }

    summary.style.display = 'block';

    cart.forEach(function(item, index) {
      var qty = item.qty || 1;
      var price = parseFloat(item.price) || 0;
      total += price * qty;

      var div = document.createElement('div');
      div.className = 'cart-item';

      var productUrl = item.id ? (siteUrl + '/product/' + item.id + '/') : '';

      if (productUrl) {
        var imgLink = document.createElement('a');
        imgLink.href = productUrl;
        var img = document.createElement('img');
        img.src = String(item.image || '');
        img.alt = String(item.title || '');
        imgLink.appendChild(img);
        div.appendChild(imgLink);
      } else {
        var img = document.createElement('img');
        img.src = String(item.image || '');
        img.alt = String(item.title || '');
        div.appendChild(img);
      }

      var info = document.createElement('div');
      info.className = 'cart-item-info';
      if (productUrl) {
        info.innerHTML =
          '<a href="' + esc(productUrl) + '"><strong>' + esc(item.title) + '</strong></a>' +
          '<span class="cart-item-price">' + esc(item.price) + ' {{ site.currency }}</span>';
      } else {
        info.innerHTML =
          '<strong>' + esc(item.title) + '</strong>' +
          '<span class="cart-item-price">' + esc(item.price) + ' {{ site.currency }}</span>';
      }
      div.appendChild(info);

      var qtyWrap = document.createElement('div');
      qtyWrap.className = 'qty-controls';

      var btnMinus = document.createElement('button');
      btnMinus.className = 'btn-qty';
      btnMinus.textContent = '−';
      btnMinus.onclick = function() { changeQty(index, -1); };

      var qtySpan = document.createElement('span');
      qtySpan.className = 'qty-value';
      qtySpan.textContent = qty;

      var btnPlus = document.createElement('button');
      btnPlus.className = 'btn-qty';
      btnPlus.textContent = '+';
      btnPlus.onclick = function() { changeQty(index, 1); };

      qtyWrap.appendChild(btnMinus);
      qtyWrap.appendChild(qtySpan);
      qtyWrap.appendChild(btnPlus);
      div.appendChild(qtyWrap);

      var btnRemove = document.createElement('button');
      btnRemove.className = 'btn-remove';
      btnRemove.textContent = '✕';
      btnRemove.title = 'Удалить';
      btnRemove.onclick = function() { removeItem(index); };
      div.appendChild(btnRemove);

      container.appendChild(div);
    });

    totalSpan.innerText = total.toLocaleString('ru-RU');
    updateBadge();
  }

  function changeQty(index, delta) {
    var cart = getCart();
    if (!cart[index]) return;
    var newQty = (cart[index].qty || 1) + delta;
    if (newQty < 1) {
      cart.splice(index, 1);
    } else {
      cart[index].qty = newQty;
    }
    saveCart(cart);
    loadCart();
  }

  function removeItem(index) {
    var cart = getCart();
    cart.splice(index, 1);
    saveCart(cart);
    loadCart();
  }

  function clearCart() {
    if (confirm('Очистить корзину?')) {
      localStorage.removeItem('mySimpleCart');
      loadCart();
    }
  }

  function checkout(messenger) {
    var cart = getCart();
    if (cart.length === 0) {
      showToast('Корзина пуста');
      return;
    }

    var total = 0;
    var message = "Здравствуйте! Хочу сделать заказ:\n\n";

    cart.forEach(function(item, index) {
      var qty = item.qty || 1;
      var price = parseFloat(item.price) || 0;
      var lineTotal = price * qty;
      total += lineTotal;

      message += (index + 1) + '. ' + item.title + ' x ' + qty + ' - ' + lineTotal.toLocaleString('ru-RU') + ' {{ site.currency }}\n';
      if (item.id) {
        message += '   ' + siteUrl + '/product/' + item.id + '/\n';
      }
    });

    message += '\n Сумма заказа: ' + total.toLocaleString('ru-RU') + ' {{ site.currency }}';

    var phone = "{{ site.whatsapp_phone }}";
    var tgUser = "{{ site.telegram_user }}";

    var url = messenger === 'wa'
      ? 'https://wa.me/' + phone + '?text=' + encodeURIComponent(message)
      : 'https://t.me/' + tgUser + '?text=' + encodeURIComponent(message);

    window.location.href = url;
  }

  document.addEventListener('DOMContentLoaded', loadCart);
</script>
