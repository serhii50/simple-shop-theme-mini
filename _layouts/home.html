---
layout: default
---

<h1>Каталог товаров ({{ site.data.products.size }} шт)</h1>

<div style="display: flex; flex-wrap: wrap; gap: 20px;">
  {% for item in site.data.products %}
    <a href="{{ '/product/' | append: item.id | append: '.html' | relative_url }}" style="text-decoration: none; color: inherit; width: 200px;">
      <div style="border: 1px solid #ddd; border-radius: 8px; padding: 10px; height: 100%;">
        <img src="{{ item.image }}" alt="{{ item.title }}" style="width: 100%; height: 150px; object-fit: cover; border-radius: 4px;">
        <h3 style="font-size: 16px; margin: 10px 0;">{{ item.title }}</h3>
        <p style="font-weight: bold; margin: 0;">{{ item.price }} {{ site.currency }}</p>
      </div>
    </a>
  {% endfor %}
</div>
